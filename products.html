<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Phones — Mobile 2000</title>
  <meta name="description" content="Browse and filter smartphones by brand, price, RAM, storage, screen and battery." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%230b46e6'/><path fill='white' d='M13 4 6 13h4l-1 7 7-9h-4z'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/theme.js"></script>
</head>
<body data-page="shop">
  <div id="site-header"></div>

  <div class="container">
    <nav class="crumb"><a href="index.html" data-i18n="nav.home">Home</a> / <span data-i18n="shop.title">All Phones</span></nav>
  </div>

  <main class="container section-sm">
    <div class="shop-layout">
      <aside class="filters card card-pad" id="filters">
        <div class="row between" style="margin-bottom:8px">
          <h3 data-i18n="shop.filters">Filters</h3>
          <button class="link" id="clearFilters" style="color:var(--primary);font-weight:600;font-size:.85rem" data-i18n="shop.clear">Clear all</button>
        </div>
        <div id="filterBody"></div>
        <button class="btn btn-primary btn-block filters-toggle" id="applyMobile" style="margin-top:16px">Apply</button>
      </aside>

      <section>
        <div class="toolbar">
          <button class="chip filters-toggle" id="openFilters">☰ <span data-i18n="shop.filters">Filters</span></button>
          <span class="muted"><span data-i18n="shop.showing">Showing</span> <b id="count">0</b> <span data-i18n="shop.products">products</span></span>
          <select class="input" id="sort" style="width:auto">
            <option value="popular" data-i18n="sort.popular">Most popular</option>
            <option value="priceLow" data-i18n="sort.priceLow">Price: low to high</option>
            <option value="priceHigh" data-i18n="sort.priceHigh">Price: high to low</option>
            <option value="newest" data-i18n="sort.newest">Newest</option>
            <option value="rating" data-i18n="sort.rating">Highest rated</option>
          </select>
        </div>
        <div id="results"></div>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/store.js"></script>
  <script src="js/recommend.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/assistant.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
